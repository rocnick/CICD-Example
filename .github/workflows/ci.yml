name: Python CI

on:                                   # 1. Event triggers
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest            # 2. GitHub-hosted runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4        # 3. Reusable Actions from Marketplace

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'                    # 4. Built-in caching shorthand

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 . --max-line-length=100

      - name: Run tests
        run: pytest --cov=src tests/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4  # 5. Store test artifacts
        with:
          name: coverage-report
          path: htmlcov/